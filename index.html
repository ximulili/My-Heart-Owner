<script>
const CFG={partnerName:'Phainon',myName:'Valoria',balance:0,partnerBalance:0,darkMode:false,bubbleOp:1,pokeChance:3,compAccept:70,arChance:60,compWaitMin:2,compWaitMax:8,replyMin:1,replyMax:3,cardMixMin:1,cardMixMax:1,momentFreqMin:1,momentFreqMax:3,compExitChance:20,videoCallChance:5,voiceCallChance:5,doodleChance:10};
const DEF_INTERACT=[{a:'戳了戳',e:'👉'},{a:'捏了捏',e:'🤏'},{a:'亲了亲',e:'💋'},{a:'抱了抱',e:'🫂'},{a:'摸了摸头',e:'🥰'},{a:'拍了拍',e:'👋'},{a:'蹭了蹭',e:'😊'},{a:'揪了揪耳朵',e:'😝'}];
const COMP_MODES={study:{em:'📚',lb:'学习陪伴'},work:{em:'💻',lb:'工作陪伴'},sleep:{em:'🌙',lb:'睡觉陪伴'},exercise:{em:'🏃',lb:'运动陪伴'}};
const COMP_DURS={study:[15,25,30,45,60],work:[15,25,30,45,60],sleep:[{v:0,l:'好好休息'}],exercise:[15,25,30,45,60]};
const MENU=[{i:'fas fa-globe',l:'朋友圈',v:'view-moments'},{i:'fas fa-calendar',l:'纪念日',v:'view-anniversary'},{i:'fas fa-clock',l:'时间线',v:'view-timeline'},{i:'fas fa-envelope',l:'信件',v:'view-letters'},{i:'fas fa-paint-brush',l:'涂鸦',v:'view-doodle'},{i:'fas fa-heart',l:'陪伴',v:'view-companion'},{i:'fas fa-star',l:'收藏',v:'view-favorites'},{i:'fas fa-cog',l:'设置',v:'view-settings'}];

let S={compOn:false,compMode:null,compDur:0,compTimer:null,compExitTimer:null,pPlaying:false,pIdx:0,pSongs:[],audio:new Audio(),dColor:'#333',intTarget:'partner',pubPhoto:null,cpTab:0,vcState:null,vcTimer:null,vcSecs:0,vcMini:false,vccState:null,vccTimer:null,vccSecs:0,vccMini:false,typingEl:null,statusTimers:[],voiceAudio:null};

async function ga(s){try{return(await localforage.getItem(s))||[]}catch(e){return[]}}
async function ad(s,d){const a=await ga(s);d.id=Date.now()+Math.random();a.push(d);await localforage.setItem(s,a);return d.id}
async function pu(s,d){const a=await ga(s);const i=a.findIndex(x=>x.id===d.id);if(i>=0)a[i]=d;else a.push(d);await localforage.setItem(s,a)}
async function dl(s,id){await localforage.setItem(s,(await ga(s)).filter(x=>x.id!=id))}
async function gs(k){const a=await ga('settings');const i=a.find(x=>x.key===k);return i?i.value:null}
async function ss(k,v){const a=await ga('settings');const i=a.findIndex(x=>x.key===k);if(i>=0)a[i].value=v;else a.push({key:k,value:v});await localforage.setItem('settings',a)}
const $=id=>document.getElementById(id);
const fmtT=ts=>new Date(ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
const fmtD=ts=>new Date(ts).toLocaleDateString('zh-CN');
function showModal(id){$(id).classList.add('show')}
function closeModal(id){$(id).classList.remove('show')}
function scrollB(el){el.scrollTop=el.scrollHeight}
function toast(m,d=2000){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},d)}
function compImg(file,mw=800,q=0.7){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const rt=Math.min(mw/img.width,1);c.width=img.width*rt;c.height=img.height*rt;c.getContext('2d').drawImage(img,0,0,c.width,c.height);r(c.toDataURL('image/jpeg',q))};img.src=e.target.result};rd.readAsDataURL(file)})}
function showEdit(title,body,onSave){$('eTitle').innerHTML=title;$('eBody').innerHTML=body;$('eSave').onclick=onSave;showModal('editModal')}
async function switchView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$(id).classList.add('active');if(id==='view-moments')await renderMom();if(id==='view-anniversary')await renderAnni();if(id==='view-timeline')await renderTL();if(id==='view-letters')await renderLetters();if(id==='view-favorites')await renderFav();if(id==='view-settings')await renderSet();if(id==='view-chat')scrollB($('chatBody'));if(id==='view-doodle')initDoodle();if(id==='view-companion')resetCompUI()}
function renderMenu(){$('appGrid').innerHTML=MENU.map(m=>'<div class="app-card" onclick="switchView(\''+m.v+'\')"><div class="app-ic"><i class="'+m.i+'"></i></div><div class="app-nm">'+m.l+'</div></div>').join('')}

async function editNm(who){const k=who==='partner'?'partnerName':'myName';const cur=await gs(k)||(who==='partner'?CFG.partnerName:CFG.myName);showEdit('修改'+(who==='partner'?'对方':'我的')+'昵称','<input class="mi" id="eIn" value="'+cur+'">',async()=>{const v=$('eIn').value.trim();if(v){await ss(k,v);toast('已更新');closeModal('editModal');renderSet();applyNames()}})}

async function editInteracts(){const acts=await ga('interactActions');const defs=acts.length?acts:DEF_INTERACT;let h='<div id="iaList">';defs.forEach(a=>{h+='<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center"><input class="mi" value="'+(a.a||a.action||'')+'" style="flex:1;margin:0"><input class="mi" value="'+(a.e||a.emoji||'')+'" style="width:60px;margin:0"><button class="mb sm gh" onclick="this.parentElement.remove()">×</button></div>'});h+='</div><button class="mb sm gh" onclick="addIARow()">+ 添加</button>';showEdit('互动动作',h,async()=>{const rows=$('iaList').children;const result=[];for(let r of rows){const inputs=r.querySelectorAll('input');if(inputs[0]&&inputs[0].value.trim())result.push({action:inputs[0].value.trim(),emoji:inputs[1].value.trim()})}await localforage.setItem('interactActions',result);closeModal('editModal');toast('已保存')})}

async function editStatusPool(){const pool=await ga('statusPool');let h='<div id="spList">';pool.forEach(p=>{h+='<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center"><select class="mi" style="width:80px;margin:0"><option'+(p.type==='mood'?' selected':'')+'>心情</option><option'+(p.type==='weather'?' selected':'')+'>天气</option><option'+(p.type==='activity'?' selected':'')+'>在做</option></select><input class="mi" value="'+p.text+'" style="flex:1;margin:0"><button class="mb sm gh" onclick="this.parentElement.remove()">×</button></div>'});h+='</div><button class="mb sm gh" onclick="addSPRow()">+ 添加</button>';showEdit('状态字卡池',h,async()=>{const rows=$('spList').children;const result=[];for(let r of rows){const sel=r.querySelector('select');const inp=r.querySelector('input');if(inp&&inp.value.trim()){const typeMap={'心情':'mood','天气':'weather','在做':'activity'};result.push({type:typeMap[sel.value]||sel.value,text:inp.value.trim()})}}await localforage.setItem('statusPool',result);closeModal('editModal');toast('已保存')})}

async function editCompResp(){const resps=await ga('companionResponses');const accepts=resps.filter(r=>r.type==='accept'),rejects=resps.filter(r=>r.type==='reject'),exits=resps.filter(r=>r.type==='exit');let h='<div style="margin-bottom:8px"><b>答应文案</b><div id="cr_accept">';accepts.forEach(r=>{h+='<div style="display:flex;gap:6px;margin:4px 0"><input class="mi" value="'+r.text+'" style="flex:1;margin:0"><button class="mb sm gh" onclick="this.parentElement.remove()">×</button></div>'});h+='</div><button class="mb sm gh" onclick="addCRRow(\'accept\')">+ 添加</button></div><div style="margin-bottom:8px"><b>拒绝文案</b><div id="cr_reject">';rejects.forEach(r=>{h+='<div style="display:flex;gap:6px;margin:4px 0"><input class="mi" value="'+r.text+'" style="flex:1;margin:0"><button class="mb sm gh" onclick="this.parentElement.remove()">×</button></div>'});h+='</div><button class="mb sm gh" onclick="addCRRow(\'reject\')">+ 添加</button></div><div><b>退出文案</b><div id="cr_exit">';exits.forEach(r=>{h+='<div style="display:flex;gap:6px;margin:4px 0"><input class="mi" value="'+r.text+'" style="flex:1;margin:0"><button class="mb sm gh" onclick="this.parentElement.remove()">×</button></div>'});h+='</div><button class="mb sm gh" onclick="addCRRow(\'exit\')">+ 添加</button></div>';showEdit('应答文案',h,async()=>{const result=[];['accept','reject','exit'].forEach(t=>{const el=$('cr_'+t);if(!el)return;for(let r of el.children){const inp=r.querySelector('input');if(inp&&inp.value.trim())result.push({type:t,text:inp.value.trim()})}});await localforage.setItem('companionResponses',result);closeModal('editModal');toast('已保存')})}
function addCRRow(t){$('cr_'+t).insertAdjacentHTML('beforeend','<div style="display:flex;gap:6px;margin:4px 0"><input class="mi" placeholder="文案" style="flex:1;margin:0"><button class="mb sm gh" onclick="this.parentElement.remove()">×</button></div>')}
async function showCardPool(idx){S.cpTab=idx||0;renderCPTabs();await renderCPList();showModal('cardPoolModal')}
function renderCPTabs(){$('cpTabs').innerHTML=CP_TABS.map((t,i)=>'<button class="cp-tab'+(i===S.cpTab?' active':'')+'" onclick="S.cpTab='+i+';renderCPTabs();renderCPList()">'+t.label+'</button>').join('')}
async function renderCPList(){const tab=CP_TABS[S.cpTab];const items=await ga(tab.key);const fk=tab.fk;let h='';if(tab.isSticker){items.forEach(s=>{h+='<div class="cp-card"><img src="'+s.data+'" style="width:40px;height:40px;border-radius:4px;object-fit:cover"><span class="text">表情包</span><div><button class="act-btn" onclick="dl(\''+tab.key+'\','+s.id+').then(renderCPList)">删除</button></div></div>'})}else{items.forEach(c=>{const txt=c[fk]||c.text||'';const grp=c.group?'<span style="font-size:10px;color:var(--text2);background:var(--accent2);padding:1px 5px;border-radius:4px;margin-left:4px">'+c.group+'</span>':'';h+='<div class="cp-card"><span class="text">'+txt+grp+'</span><div><button class="act-btn" onclick="editCardItem(\''+tab.key+'\','+c.id+',\''+fk+'\')">编辑</button> <button class="act-btn" onclick="dl(\''+tab.key+'\','+c.id+').then(renderCPList)">删除</button></div></div>'})}$('cpList').innerHTML=h||'<div style="text-align:center;color:#999;padding:20px">暂无字卡</div>';$('cpCount').textContent='共 '+items.length+' 条'}
async function addCardToPool(){const tab=CP_TABS[S.cpTab];if(tab.isSticker){$('stickerInput').click();return}const text=prompt('输入字卡内容：');if(!text)return;const item={};item[tab.fk]=text;if(S.cpTab===0){const grp=prompt('分组名称（可留空）：','');if(grp)item.group=grp};if(tab.subModes){const mode=prompt('模式（study/work/sleep/exercise）：','study');if(!mode)return;item.mode=mode}await ad(tab.key,item);await renderCPList()}
async function editCardItem(store,id,key){const items=await ga(store);const item=items.find(x=>x.id==id);if(!item)return;const cur=item[key]||'';const text=prompt('编辑字卡：',cur);if(text===null)return;if(text.trim()){item[key]=text.trim();await pu(store,item)}else{await dl(store,id)}await renderCPList()}
async function importCardsJSON(inp){if(!inp.files[0])return;const text=await inp.files[0].text();try{const data=JSON.parse(text);const tab=CP_TABS[S.cpTab];let count=0;for(const item of data){if(item.text||item[tab.fk]){const obj={};obj[tab.fk]=item.text||item[tab.fk];if(item.mode)obj.mode=item.mode;await ad(tab.key,obj);count++}}toast('已导入 '+count+' 条字卡');await renderCPList()}catch(e){toast('JSON格式错误')}inp.value=''}

async function sendMsg(){const inp=$('chatInput'),text=inp.value.trim();if(!text)return;inp.value='';const msg={sender:'me',type:'text',text,timestamp:Date.now(),status:'delivered'};msg.id=await ad('messages',msg);appendBub(msg);scrollB($('chatBody'));updateMsgStatus(msg.id,'delivered');const rMin=(await gs('replyMin'))??1,rMax=(await gs('replyMax'))??3;const delay=(rMin+Math.random()*(rMax-rMin))*1000;showTyping();const pc=await gs('pokeChance')??3;if(Math.random()*100<pc){setTimeout(async()=>{const acts=await ga('interactActions');const pool=acts.length?acts:DEF_INTERACT;const act=pool[Math.floor(Math.random()*pool.length)];const pn=await gs('partnerName')||CFG.partnerName;const mn=await gs('myName')||CFG.myName;const sys={sender:'system',type:'system',text:mn+' '+(act.action||act.a)+' '+pn+(act.emoji||act.e),timestamp:Date.now()};sys.id=await ad('messages',sys);appendBub(sys);scrollB($('chatBody'))},500+Math.random()*2000)}setTimeout(async()=>{removeTyping();const mixMin=(await gs('cardMixMin'))??1,mixMax=(await gs('cardMixMax'))??1;const cnt=mixMin+Math.floor(Math.random()*(mixMax-mixMin+1));const cards=await ga('flashcards');let rt='';if(cards.length&&cnt>0){const parts=[];for(let i=0;i<cnt;i++){const c=cards[Math.floor(Math.random()*cards.length)];parts.push(c.replyText||c.text||'...')}rt=parts.join(' ')}else{rt='...'}let rp;if(Math.random()*100<(await gs('doodleChance'))??10){const _stks=await ga('stickers');if(_stks.length){const _s=_stks[Math.floor(Math.random()*_stks.length)];rp={sender:'partner',type:'sticker',text:_s.data,timestamp:Date.now()}}else{rp={sender:'partner',type:'text',text:rt,timestamp:Date.now()}}}else{rp={sender:'partner',type:'text',text:rt,timestamp:Date.now()}};rp.id=await ad('messages',rp);appendBub(rp);scrollB($('chatBody'));updateMsgStatus(msg.id,'read');checkVideoCallChance();if(Math.random()<0.05){setTimeout(()=>partnerTransfer(),5000+Math.random()*10000)}},delay)}
function showTyping(){if(S.typingEl)return;const body=$('chatBody');const div=document.createElement('div');div.className='typing-bub';div.innerHTML='<div class="av p"></div><div class="typing-dots"><span></span><span></span><span></span></div>';body.appendChild(div);S.typingEl=div;scrollB(body)}

function updateMsgStatus(id,status){const el=document.querySelector('[data-mid="'+id+'"] .msg-st');if(!el)return;const map={delivered:'已送达',read:'已读',noreply:'已读不回'};el.textContent=map[status]||status}
function appendBub(msg){const body=$('chatBody'),div=document.createElement('div');
if(msg.type==='system'){div.className='bub-sys';div.textContent=msg.text;body.appendChild(div);return}
if(msg.type==='image'){div.className='msg '+(msg.sender==='me'?'mine':'other');div.innerHTML='<div class="av '+(msg.sender==='me'?'m':'p')+'"></div><div class="bub"><img src="'+msg.text+'" style="max-width:180px;border-radius:8px"><div class="meta">'+fmtT(msg.timestamp)+'</div></div>';body.appendChild(div);return}
if(msg.type==='sticker'){div.className='msg '+(msg.sender==='me'?'mine':'other');div.innerHTML='<div class="av '+(msg.sender==='me'?'m':'p')+'"></div><div class="bub" style="padding:3px;background:transparent;box-shadow:none"><img src="'+msg.text+'" style="max-width:100px;border-radius:6px"><div class="meta">'+fmtT(msg.timestamp)+'</div></div>';body.appendChild(div);return}

async function startComp(mode,dur){const resps=await ga('companionResponses');const compChance=await gs('compAccept')??70,wMin=await gs('compWaitMin')??2,wMax=await gs('compWaitMax')??8;resetCompUI();$('compModes').style.display='none';$('compActive').classList.add('show');$('compSt').textContent='对方正在考虑...';$('compHt').textContent='';const pn=await gs('partnerName')||CFG.partnerName,mn=await gs('myName')||CFG.myName;const wait=(wMin+Math.random()*(wMax-wMin))*1000;await new Promise(r=>setTimeout(r,wait));if(Math.random()*100<compChance){const accepts=resps.filter(r=>r.type==='accept');const msg=accepts.length?accepts[Math.floor(Math.random()*accepts.length)].text:'好呀，来陪你';const sysMsg={sender:'partner',type:'text',text:msg,timestamp:Date.now()};sysMsg.id=await ad('messages',sysMsg);if($('view-chat').classList.contains('active')){appendBub(sysMsg);scrollB($('chatBody'))}const durLabel=dur===0?'好好休息':dur+'分钟';const startSys={sender:'system',type:'system',text:mn+' 发起了'+COMP_MODES[mode].lb+'（'+durLabel+'）',timestamp:Date.now()};startSys.id=await ad('messages',startSys);if($('view-chat').classList.contains('active')){appendBub(startSys);scrollB($('chatBody'))}$('compSt').textContent=COMP_MODES[mode].em+' '+COMP_MODES[mode].lb;$('compHt').textContent=durLabel+' · 触碰屏幕互动';S.compOn=true;S.compMode=mode;S.compDur=dur;$('chatBody').classList.add('comp-mode');if(dur>0){S.compTimer=setTimeout(()=>endComp(false),dur*60*1000)}setupCompExit()}else{const rejects=resps.filter(r=>r.type==='reject');const msg=rejects.length?rejects[Math.floor(Math.random()*rejects.length)].text:'现在不太方便哦';const rejMsg={sender:'partner',type:'text',text:msg,timestamp:Date.now()};rejMsg.id=await ad('messages',rejMsg);if($('view-chat').classList.contains('active')){appendBub(rejMsg);scrollB($('chatBody'))}setTimeout(resetCompUI,2000)}}
function setupCompExit(){if(S.compExitTimer)clearTimeout(S.compExitTimer);const checkExit=async()=>{if(!S.compOn)return;const exitChance=await gs('compExitChance')??20;if(Math.random()*100<exitChance){const resps=await ga('companionResponses');const exits=resps.filter(r=>r.type==='exit');const pn=await gs('partnerName')||CFG.partnerName;const msg=exits.length?exits[Math.floor(Math.random()*exits.length)].text:pn+' 需要休息一下';const exitMsg={sender:'partner',type:'text',text:msg,timestamp:Date.now()};exitMsg.id=await ad('messages',exitMsg);if($('view-chat').classList.contains('active')){appendBub(exitMsg);scrollB($('chatBody'))}endComp(true)}else{S.compExitTimer=setTimeout(checkExit,60000+Math.random()*120000)}};S.compExitTimer=setTimeout(checkExit,60000+Math.random()*120000)}
async function endComp(exited){if(!S.compOn)return;S.compOn=false;if(S.compTimer)clearTimeout(S.compTimer);if(S.compExitTimer)clearTimeout(S.compExitTimer);$('chatBody').classList.remove('comp-mode');const pn=await gs('partnerName')||CFG.partnerName,mn=await gs('myName')||CFG.myName;const modeLabel=COMP_MODES[S.compMode]?COMP_MODES[S.compMode].lb:'陪伴';const durLabel=S.compDur===0?'':S.compDur+'分钟的';const endText=exited?pn+' 退出了陪伴':durLabel+modeLabel+'结束了';const endSys={sender:'system',type:'system',text:endText,timestamp:Date.now()};endSys.id=await ad('messages',endSys);if($('view-chat').classList.contains('active')){appendBub(endSys);scrollB($('chatBody'))}resetCompUI();S.compMode=null;S.compDur=0;if(Math.random()<0.3){setTimeout(async()=>{const _pn=await gs('partnerName')||CFG.partnerName;const _cm={sender:'partner',type:'text',text:'再陪我一会儿嘛~',timestamp:Date.now()};_cm.id=await ad('messages',_cm);appendBub(_cm);scrollB(chatBody)},3000+Math.random()*5000)}}
async function exitComp(){await endComp(false)}
$('compActive').addEventListener('click',async()=>{if(!S.compOn)return;const cards=(await ga('companionCards')).filter(c=>c.mode===S.compMode);if(!cards.length){toast('陪伴字卡池为空，请在设置中添加');return}const card=cards[Math.floor(Math.random()*cards.length)];const pn=await gs('partnerName')||CFG.partnerName;showCompMsg(card.text,pn)})
async function handleAR(inp){if(!inp.files[0])return;const b=await compImg(inp.files[0],180,.7);$('arPreview').src=b;$('arResult').textContent='';const chance=await gs('arChance')??60;setTimeout(async()=>{if(Math.random()*100<chance){await ss('partnerAvatar',b);applyAvatars();$('arResult').innerHTML='<span style="color:green;font-weight:600">对方同意了！头像已更换 ✓</span>'}else{$('arResult').innerHTML='<span style="color:var(--accent);font-weight:600">对方拒绝了...下次再试试</span>'}},500);inp.value=''}
function openTransferModal(){$('tAmt').value='';$('tNote').value='';showModal('transferModal')}
async function doTransfer(){const amt=parseFloat($('tAmt').value);if(isNaN(amt)||amt<=0){toast('请输入有效金额');return}const note=$('tNote').value.trim();let bal=await gs('balance')??0;if(bal<amt){toast('余额不足');return}bal-=amt;await ss('balance',bal);let pbal=await gs('partnerBalance')??0;pbal+=amt;await ss('partnerBalance',pbal);const msg={sender:'me',type:'transfer',amount:amt,note,timestamp:Date.now()};msg.id=await ad('messages',msg);closeModal('transferModal');appendBub(msg);scrollB($('chatBody'));setTimeout(async()=>{const _pn=await gs('partnerName')||CFG.partnerName;const _rm={sender:'partner',type:'transfer-receipt',amount:amt,timestamp:Date.now()};_rm.id=await ad('messages',_rm);appendBub(_rm);scrollB($('chatBody'))},2000+Math.random()*2000)}
async function partnerTransfer(){const pbal=await gs('partnerBalance')??0;if(pbal<=0)return;const amt=Math.min(pbal,Math.floor(Math.random()*50)+1);let bal=await gs('balance')??0;bal+=amt;await ss('balance',bal);await ss('partnerBalance',pbal-amt);const pn=await gs('partnerName')||CFG.partnerName;const msg={sender:'partner',type:'transfer',amount:amt,note:pn+'给你转了一笔账',timestamp:Date.now()};msg.id=await ad('messages',msg);appendBub(msg);scrollB($('chatBody'))}
async function startVideoCall(){const pn=await gs('partnerName')||CFG.partnerName;const pa=await gs('partnerAvatar')||'';$('vcAvatar').style.backgroundImage=pa?'url('+pa+')':'var(--partner-av)';$('vcName').textContent=pn;$('vcStatus').textContent='正在呼叫...';$('vcTimer').style.display='none';S.vcState='calling';S.vcSecs=0;S.vcMini=false;$('vcModal').classList.add('show');$('vcMini').classList.remove('show');const wait=2000+Math.random()*3000;setTimeout(async()=>{if(S.vcState!=='calling')return;const accept=Math.random()<0.7;if(accept){S.vcState='connected';$('vcStatus').textContent='通话中';$('vcTimer').style.display='';S.vcTimer=setInterval(()=>{S.vcSecs++;const m=String(Math.floor(S.vcSecs/60)).padStart(2,'0');const s=String(S.vcSecs%60).padStart(2,'0');const t=m+':'+s;$('vcTimer').textContent=t;$('vcMiniTime').textContent=t},1000);const sys={sender:'system',type:'system',text:'视频通话已接通',timestamp:Date.now()};sys.id=await ad('messages',sys);if($('view-chat').classList.contains('active')){appendBub(sys);scrollB($('chatBody'))}}else{$('vcStatus').textContent=Math.random()<0.5?pn+'未接听':pn+'已拒绝';setTimeout(()=>{closeVC()},2000)}},wait)}
function minimizeVC(){S.vcMini=true;$('vcModal').classList.remove('show');$('vcMini').classList.add('show')}
function restoreVC(){S.vcMini=false;$('vcModal').classList.add('show');$('vcMini').classList.remove('show')}
function endVC(){if(S.vcTimer)clearInterval(S.vcTimer);const secs=S.vcSecs;const m=String(Math.floor(secs/60)).padStart(2,'0');const s=String(secs%60).padStart(2,'0');closeVC();if(secs>0){const sys={sender:'system',type:'system',text:'视频通话 '+m+':'+s,timestamp:Date.now()};ad('messages',sys).then(()=>{if($('view-chat').classList.contains('active')){appendBub(sys);scrollB($('chatBody'))}})}}
function closeVC(){S.vcState=null;if(S.vcTimer)clearInterval(S.vcTimer);$('vcModal').classList.remove('show');$('vcMini').classList.remove('show');S.vcSecs=0}
async function checkVideoCallChance(){const chance=await gs('videoCallChance')??5;if(Math.random()*100>=chance)return;setTimeout(async()=>{const pn=await gs('partnerName')||CFG.partnerName;const pa=await gs('partnerAvatar')||'';$('vcAvatar').style.backgroundImage=pa?'url('+pa+')':'var(--partner-av)';$('vcName').textContent=pn;$('vcStatus').textContent=pn+' 发来视频通话...';$('vcTimer').style.display='none';S.vcState='incoming';S.vcSecs=0;$('vcModal').classList.add('show');setTimeout(async()=>{if(S.vcState!=='incoming')return;if(Math.random()<0.3){$('vcStatus').textContent=pn+'已挂断';setTimeout(()=>{closeVC()},2000);return}S.vcState='connected';$('vcStatus').textContent='通话中';$('vcTimer').style.display='';S.vcTimer=setInterval(()=>{S.vcSecs++;const m=String(Math.floor(S.vcSecs/60)).padStart(2,'0');const s=String(S.vcSecs%60).padStart(2,'0');$('vcTimer').textContent=m+':'+s;$('vcMiniTime').textContent=m+':'+s},1000);const sys={sender:'system',type:'system',text:pn+' 发起的视频通话已接通',timestamp:Date.now()};sys.id=await ad('messages',sys);if($('view-chat').classList.contains('active')){appendBub(sys);scrollB($('chatBody'))}},3000+Math.random()*2000)},5000+Math.random()*10000)}
async function handlePhoto(inp){if(!inp.files[0])return;const b=await compImg(inp.files[0]);const msg={sender:'me',type:'image',text:b,timestamp:Date.now()};msg.id=await ad('messages',msg);appendBub(msg);scrollB($('chatBody'));inp.value=''}
async function handleBg(inp){if(!inp.files[0])return;const b=await compImg(inp.files[0],800,.7);await ss('chatBg',b);applyBgs();toast('背景已更新');inp.value=''}
async function handleCover(inp){if(!inp.files[0])return;const b=await compImg(inp.files[0],800,.7);await ss('momentsCover',b);toast('封面已更新');inp.value=''}
async function renderFav(){const favs=await ga('favorites');const pn=await gs('partnerName')||CFG.partnerName,mn=await gs('myName')||CFG.myName;let h='';for(const f of favs){h+='<div class="li"><button class="del" onclick="dl(\'favorites\',\''+f.id+'\').then(renderFav)">×</button><div class="title">'+(f.sender==='me'?mn:pn)+'</div><div class="sub">'+fmtD(f.timestamp)+'</div><div style="margin-top:4px">'+((f.type==='image'||f.type==='sticker')?'<img src="'+f.text+'" style="max-width:120px;border-radius:6px">':f.text)+'</div></div>'}$('favList').innerHTML=h||'<div style="text-align:center;color:#888;padding:20px">暂无收藏</div>'}
async function exportData(){const data={};for(const s of STORES)data[s]=await ga(s);const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='heart_backup_'+Date.now()+'.json';a.click();toast('已导出')}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async function(){const file=this.files[0];if(!file)return;const text=await file.text();try{const data=JSON.parse(text);for(const s of STORES)if(data[s])await localforage.setItem(s,data[s]);toast('已导入，正在刷新...');setTimeout(()=>location.reload(),1000)}catch(e){toast('文件格式错误')}};inp.click()}
async function init(){await applyDark();await applyNames();await applyAvatars();await applyBgs();renderMenu();await renderMsgs();await initPlayer();await updateStatus();await scheduleLetterReply();await autoPostTimeline();setInterval(updateStatus,300000);setInterval(scheduleLetterReply,600000);setInterval(autoPostTimeline,1800000);setTimeout(()=>{const vcChance=gs('videoCallChance')??5;if(Math.random()*100<vcChance)checkVideoCallChance()},30000+Math.random()*60000);
await checkBulletin();
initVoiceHold();;setTimeout(()=>{const vocChance=gs('voiceCallChance')??5;if(Math.random()*100<vocChance)checkVoiceCallChance()},50000+Math.random()*80000);showBulletin()}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
let ctxMsgId=null;function showCtx(x,y,id){ctxMsgId=id;const m=document.getElementById('ctxMenu');m.style.display='block';m.style.left=Math.min(x,window.innerWidth-120)+'px';m.style.top=Math.min(y,window.innerHeight-120)+'px'}function hideCtx(){document.getElementById('ctxMenu').style.display='none';ctxMsgId=null}document.addEventListener('click',hideCtx);async function ctxQuote(){hideCtx();if(!ctxMsgId)return;const msgs=await ga('messages');const m=msgs.find(x=>x.id==ctxMsgId);if(!m)return;const _pn=await gs('partnerName')||CFG.partnerName,_mn=await gs('myName')||CFG.myName;const nm=m.sender==='me'?_mn:_pn;const txt=m.text||'[图片]';chatInput.placeholder='引用: '+nm+': '+txt.substring(0,20)+'...';chatInput.focus()}async function ctxFav(){hideCtx();if(ctxMsgId)await favMsg(ctxMsgId)}async function ctxDel(){hideCtx();if(!ctxMsgId)return;await dl('messages',ctxMsgId);await renderMsgs();toast('已删除')}function showCompMsg(text,pn){const d=document.createElement('div');d.style.cssText='position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.7);color:#fff;padding:12px 20px;border-radius:12px;font-size:15px;z-index:3000;opacity:0;transition:opacity .3s;max-width:80%;text-align:center;pointer-events:none';d.textContent=pn+': '+text;document.body.appendChild(d);requestAnimationFrame(()=>d.style.opacity='1');setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),300)},5000);const sys={sender:'system',type:'system',text:pn+': '+text,timestamp:Date.now()};ad('messages',sys)}

function togglePlusPanel(){const pp=$('plusPanel');if(pp.classList.contains('recording'))return;$('stickerDrawer').classList.remove('show');pp.classList.toggle('show')}
function closePlusPanel(){if($('plusPanel').classList.contains('recording'))cancelVoiceHold();$('plusPanel').classList.remove('show')}

async function initVoiceHold(){
  const btn=document.getElementById('voiceHoldBtn');if(!btn)return;
  const nm=btn.querySelector('.plus-nm');let t=0;
  const start=e=>{e.preventDefault();t=Date.now();if(nm)nm.textContent='松开 发送';btn.style.opacity='.6';};
  const stop=e=>{e.preventDefault();const dur=t>0?Math.ceil((Date.now()-t)/1000):0;
    if(nm)nm.textContent='按住 说话';btn.style.opacity='';t=0;
    if(dur<1)return;
    const msg={sender:'me',type:'voice',text:'',duration:dur,timestamp:Date.now()};
    ad('messages',msg).then(id=>{msg.id=id;appendBub(msg);scrollB($('chatBody'));triggerReply()});
    closePlusPanel();
  };
  btn.addEventListener('mousedown',start);btn.addEventListener('mouseup',stop);
  btn.addEventListener('mouseleave',e=>{if(t>0){t=0;if(nm)nm.textContent='按住 说话';btn.style.opacity='';toast('已取消')}});
  btn.addEventListener('touchstart',start,{passive:false});
  btn.addEventListener('touchend',stop,{passive:false});
  btn.addEventListener('touchcancel',()=>{if(t>0){t=0;if(nm)nm.textContent='按住 说话';btn.style.opacity='';toast('已取消')}});
}
function playVoice(el,msgId){const dataUrl=voiceData[msgId];if(!dataUrl)return;if(el.classList.contains('playing')){if(S.voiceAudio){S.voiceAudio.pause();S.voiceAudio=null}el.classList.remove('playing');return}if(S.voiceAudio){S.voiceAudio.pause();document.querySelectorAll('.v-bub.playing').forEach(e=>e.classList.remove('playing'))}const audio=new Audio(dataUrl);S.voiceAudio=audio;el.classList.add('playing');audio.play();audio.onended=()=>{el.classList.remove('playing');S.voiceAudio=null}}
async function triggerReply(){const rMin=(await gs('replyMin'))??1,rMax=(await gs('replyMax'))??3;const delay=(rMin+Math.random()*(rMax-rMin))*1000;showTyping();setTimeout(async()=>{removeTyping();const mixMin=(await gs('cardMixMin'))??1,mixMax=(await gs('cardMixMax'))??1;const cnt=mixMin+Math.floor(Math.random()*(mixMax-mixMin+1));const cards=await ga('flashcards');let rt='';if(cards.length&&cnt>0){const parts=[];for(let i=0;i<cnt;i++){const c=cards[Math.floor(Math.random()*cards.length)];parts.push(c.replyText||c.text||'...')}rt=parts.join(' ')}else{rt='...'}let rp;if(Math.random()*100<(await gs('doodleChance'))??10){const _stks=await ga('stickers');if(_stks.length){const _s=_stks[Math.floor(Math.random()*_stks.length)];rp={sender:'partner',type:'sticker',text:_s.data,timestamp:Date.now()}}else{rp={sender:'partner',type:'text',text:rt,timestamp:Date.now()}}}else{rp={sender:'partner',type:'text',text:rt,timestamp:Date.now()}}rp.id=await ad('messages',rp);appendBub(rp);scrollB($('chatBody'))},delay)}

async function exportFlashcards(){const cards=await ga('flashcards');const blob=new Blob([JSON.stringify(cards,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='flashcards_backup_'+Date.now()+'.json';a.click();toast('导出成功，共 '+cards.length+' 条字卡')}
async function startVoiceCall(){const pn=await gs('partnerName')||CFG.partnerName;const pa=await gs('partnerAvatar')||'';$('vccAvatar').style.backgroundImage=pa?'url('+pa+')':'var(--partner-av)';$('vccName').textContent=pn;$('vccStatus').textContent='正在呼叫...';$('vccTimer').style.display='none';S.vccState='calling';S.vccSecs=0;S.vccMini=false;$('vccModal').classList.add('show');$('vccMini').classList.remove('show');const wait=2000+Math.random()*3000;setTimeout(async()=>{if(S.vccState!=='calling')return;const accept=Math.random()<0.7;if(accept){S.vccState='connected';$('vccStatus').textContent='通话中';$('vccTimer').style.display='';S.vccTimer=setInterval(()=>{S.vccSecs++;const m=String(Math.floor(S.vccSecs/60)).padStart(2,'0');const s=String(S.vccSecs%60).padStart(2,'0');const t=m+':'+s;$('vccTimer').textContent=t;$('vccMiniTime').textContent=t},1000);const sys={sender:'system',type:'system',text:'语音通话已接通',timestamp:Date.now()};sys.id=await ad('messages',sys);if($('view-chat').classList.contains('active')){appendBub(sys);scrollB($('chatBody'))}}else{$('vccStatus').textContent=Math.random()<0.5?pn+'未接听':pn+'已拒绝';setTimeout(()=>{closeVCC()},2000)}},wait)}
function endVCC(){if(S.vccTimer)clearInterval(S.vccTimer);const secs=S.vccSecs;const m=String(Math.floor(secs/60)).padStart(2,'0');const s=String(secs%60).padStart(2,'0');closeVCC();if(secs>0){const sys={sender:'system',type:'system',text:'语音通话 '+m+':'+s,timestamp:Date.now()};ad('messages',sys).then(()=>{if($('view-chat').classList.contains('active')){appendBub(sys);scrollB($('chatBody'))}})}}
function closeVCC(){S.vccState=null;if(S.vccTimer)clearInterval(S.vccTimer);$('vccModal').classList.remove('show');$('vccMini').classList.remove('show');S.vccSecs=0}
function minimizeVCC(){S.vccMini=true;$('vccModal').classList.remove('show');$('vccMini').classList.add('show')}
function restoreVCC(){S.vccMini=false;$('vccModal').classList.add('show');$('vccMini').classList.remove('show')}
async function checkVoiceCallChance(){const chance=await gs('voiceCallChance')??5;if(Math.random()*100>=chance)return;setTimeout(async()=>{const pn=await gs('partnerName')||CFG.partnerName;const pa=await gs('partnerAvatar')||'';$('vccAvatar').style.backgroundImage=pa?'url('+pa+')':'var(--partner-av)';$('vccName').textContent=pn;$('vccStatus').textContent=pn+' 发来语音通话...';$('vccTimer').style.display='none';S.vccState='incoming';S.vccSecs=0;$('vccModal').classList.add('show');setTimeout(async()=>{if(S.vccState!=='incoming')return;if(Math.random()<0.3){$('vccStatus').textContent=pn+'已挂断';setTimeout(()=>{closeVCC()},2000);return}S.vccState='connected';$('vccStatus').textContent='通话中';$('vccTimer').style.display='';S.vccTimer=setInterval(()=>{S.vccSecs++;const m=String(Math.floor(S.vccSecs/60)).padStart(2,'0');const s=String(S.vccSecs%60).padStart(2,'0');$('vccTimer').textContent=m+':'+s;$('vccMiniTime').textContent=m+':'+s},1000);const sys={sender:'system',type:'system',text:pn+' 发起的语音通话已接通',timestamp:Date.now()};sys.id=await ad('messages',sys);if($('view-chat').classList.contains('active')){appendBub(sys);scrollB($('chatBody'))}},3000+Math.random()*2000)},5000+Math.random()*10000)}
async function showBulletin(){const today=new Date().toISOString().slice(0,10);const last=localStorage.getItem('lastBulletinDate');if(last===today)return;localStorage.setItem('lastBulletinDate',today);const cards=await ga('flashcards');if(!cards.length)return;const cnt=2+Math.floor(Math.random()*2);const picked=[];for(let i=0;i<Math.min(cnt,cards.length);i++){const c=cards[Math.floor(Math.random()*cards.length)];if(!picked.includes(c))picked.push(c)}const texts=picked.map(c=>c.replyText||c.text||'...');$('bltContent').innerHTML=texts.map(t=>'\u2022 '+t).join('<br>');$('bltDate').textContent=new Date().toLocaleDateString('zh-CN');$('bulletinModal').classList.add('show')}
function closeBulletin(){$('bulletinModal').classList.remove('show')}
