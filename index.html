<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Heart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="purple">
<div class="app" id="app">

  <!-- ===== 顶部状态栏 ===== -->
  <header class="header">
    <div class="header-motto" id="mottoBar"><span class="motto-text" id="mottoText">Heart</span></div>
    <div class="header-inner">
      <div class="user-info other" id="otherInfo">
        <div class="user-name" id="partnerName">白厄</div>
        <div class="user-avatar" id="otherAvatar" data-shape="circle"></div>
        <div class="user-status" id="otherStatus">在线</div>
      </div>
      <div class="header-actions">
        <button class="action-btn" id="btnVoiceCall" title="语音通话" aria-label="语音通话">
          <svg viewBox="0 0 24 24" class="icon"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z" fill="currentColor"/></svg>
        </button>
        <button class="action-btn" id="btnVideoCall" title="视频通话" aria-label="视频通话">
          <svg viewBox="0 0 24 24" class="icon"><path d="M17 10.5V7c0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1v10c0 .6.4 1 1 1h12c.6 0 1-.4 1-1v-3.5l4 4v-11l-4 4z" fill="currentColor"/></svg>
        </button>
        <button class="action-btn" id="btnSettings" title="设置" aria-label="设置">
          <svg viewBox="0 0 24 24" class="icon"><path d="M19.4 13c0-.3.1-.6.1-1s0-.7-.1-1l2-1.6c.2-.2.2-.4.1-.6l-1.9-3.3c-.1-.2-.4-.3-.6-.2l-2.4 1c-.5-.4-1-.7-1.6-1l-.4-2.5c0-.2-.3-.4-.5-.4h-3.8c-.3 0-.5.2-.5.4l-.4 2.5c-.6.3-1.1.6-1.6 1l-2.4-1c-.3-.1-.5 0-.6.2L2.5 8.8c-.1.2-.1.4.1.6L4.6 11c0 .3-.1.6-.1 1s0 .7.1 1l-2 1.6c-.2.2-.2.4-.1.6l1.9 3.3c.1.2.4.3.6.2l2.4-1c.5.4 1 .7 1.6 1l.4 2.5c0 .2.3.4.5.4h3.8c.3 0 .5-.2.5-.4l.4-2.5c.6-.3 1.1-.6 1.6-1l2.4 1c.3.1.5 0 .6-.2l1.9-3.3c.1-.2.1-.4-.1-.6L19.4 13zM12 15.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5z" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="user-info me" id="meInfo">
        <div class="user-name" id="meName">晓晓</div>
        <div class="user-avatar" id="meAvatar" data-shape="circle"></div>
        <div class="user-status" id="meStatus">在线</div>
      </div>
    </div>
  </header>

  <!-- ===== 消息流 ===== -->
  <main class="main-chat-area" id="chatArea">
    <div class="chat-container" id="chatContainer">
      <div class="empty-hint" id="emptyHint">还没有消息，发点什么吧</div>
      <div id="typingHint" class="typing-hint" hidden><span class="typing-name">白厄</span><span class="typing-dots"><i></i><i></i><i></i></span></div>
    </div>
  </main>

  <!-- ===== 底部输入栏 ===== -->
  <div class="input-area-wrapper">
    <div class="reply-preview" id="replyPreview" hidden>
      <span class="reply-label">回复</span>
      <span class="reply-name" id="replyName"></span>
      <span class="reply-text" id="replyText"></span>
      <button class="reply-close" id="replyClose" aria-label="取消引用">×</button>
    </div>
    <div class="input-area">
      <button class="input-btn" id="btnImage" title="图片" aria-label="图片">
        <svg viewBox="0 0 24 24" class="icon"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3 3.5-4.5 4.5 6H5l3.5-4.5z" fill="currentColor"/></svg>
      </button>
      <button class="input-btn" id="btnSticker" title="表情" aria-label="表情">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zM8.5 11C7.7 11 7 10.3 7 9.5S7.7 8 8.5 8 10 8.7 10 9.5 9.3 11 8.5 11zm7 0c-.8 0-1.5-.7-1.5-1.5S14.7 8 15.5 8 17 8.7 17 9.5 16.3 11 15.5 11zM12 19c-2.3 0-4.3-1.3-5.3-3.2-.2-.4.1-.8.5-.8h9.6c.4 0 .7.4.5.8C16.3 17.7 14.3 19 12 19z" fill="currentColor"/></svg>
      </button>
      <button class="input-btn" id="btnVoice" title="按住说话" aria-label="语音">
        <svg viewBox="0 0 24 24" class="icon"><path d="M12 14c1.7 0 3-1.3 3-3V6c0-1.7-1.3-3-3-3S9 4.3 9 6v5c0 1.7 1.3 3 3 3zm5-3c0 2.8-2.2 5-5 5s-5-2.2-5-5H5c0 3.5 2.5 6.4 6 6.9V21h2v-3.1c3.5-.5 6-3.4 6-6.9h-2z" fill="currentColor"/></svg>
      </button>
      <textarea class="message-input" id="messageInput" rows="1" placeholder="说点什么..."></textarea>
      <button class="send-btn" id="btnSend" aria-label="发送">
        <svg viewBox="0 0 24 24" class="icon"><path d="M3 11l18-8-8 18-2-8-8-2z" fill="currentColor"/></svg>
      </button>
    </div>

    <!-- combo 弹窗：表情/拍一拍 -->
    <div class="combo-popover" id="comboPopover" hidden>
      <div class="combo-tabs-header">
        <button class="combo-tab active" data-tab="mine">我的表情</button>
        <button class="combo-tab" data-tab="other">对方表情</button>
        <button class="combo-tab" data-tab="poke">拍一拍</button>
        <span class="combo-spacer"></span>
        <button class="combo-action" id="comboAdd" title="添加">＋</button>
        <button class="combo-action" id="comboManage" title="管理">⚙</button>
      </div>
      <div class="combo-content-area" id="comboContent">
        <div class="combo-pane active" data-pane="mine"></div>
        <div class="combo-pane" data-pane="other"></div>
        <div class="combo-pane" data-pane="poke"></div>
      </div>
    </div>

    <input type="file" id="imageFile" accept="image/*" multiple hidden>
  </div>

</div>

<!-- ===== 通话全屏覆盖层 ===== -->
<div id="callOverlay" class="call-overlay" hidden>
  <div class="call-top">
    <span class="call-status-dot" id="callStatusDot"></span>
    <span class="call-status-text" id="callStatusText">呼叫中...</span>
    <span class="call-timer" id="callTimer">00:00</span>
  </div>
  <div class="call-center">
    <div class="call-avatar-big" id="callAvatar"></div>
    <div class="call-name-big" id="callName">白厄</div>
    <div class="call-wave" id="callWave"><i></i><i></i><i></i><i></i><i></i></div>
  </div>
  <div class="call-actions" id="callActions"></div>
  <div class="call-video-pane" id="callVideoPane" hidden>对方画面</div>
</div>

<!-- ===== 通话最小化浮块 ===== -->
<div id="callMiniBar" class="call-mini-bar" hidden>
  <div class="call-mini-avatar" id="callMiniAvatar"></div>
  <span class="call-mini-name" id="callMiniName">白厄</span>
  <span class="call-mini-timer" id="callMiniTimer">00:00</span>
  <button class="call-mini-hangup" id="callMiniHangup" title="挂断">×</button>
</div>

<!-- ===== 拍一拍面板 ===== -->
<div class="poke-overlay" id="pokeOverlay" hidden>
  <div class="poke-panel">
    <div class="poke-big-avatar" id="pokeBigAvatar"></div>
    <div class="poke-hint">点头像随机 · 点按钮指定</div>
    <div class="poke-actions" id="pokeActions">
      <div class="poke-actions-scroll" id="pokeActionsScroll"></div>
    </div>
    <button class="poke-add-btn" id="pokeAddBtn" title="增加动作">＋</button>
  </div>
</div>

<!-- ===== 通用 Modal 容器 ===== -->
<div class="modal-mask" id="modalMask" hidden>
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">标题</span>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast" hidden></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/statusbar.js"></script>
<script src="js/avatar.js"></script>
<script src="js/cards.js"></script>
<script src="js/chat.js"></script>
<script src="js/poke.js"></script>
<script src="js/sticker.js"></script>
<script src="js/voice.js"></script>
<script src="js/call.js"></script>
<script src="js/imexport.js"></script>
<script src="js/settings.js"></script>
<script src="js/keepalive.js"></script>
<script src="js/app.js"></script>
</body>
</html>
